name: Distribution

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 11
          cache: gradle
      - name: Build with Gradle
        run: ./gradlew dist
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/redhat.mdita.extended-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
